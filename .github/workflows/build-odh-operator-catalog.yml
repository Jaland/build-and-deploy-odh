# Build and push Open Data Hub operator, OLM bundle, and catalog images
# (upstream: https://github.com/opendatahub-io/opendatahub-operator)
#
# Configure repository secrets:
#   QUAY_USERNAME — Quay.io username or robot account name
#   QUAY_PASSWORD — Quay.io password or robot token
#   QUAY_REPO — Default image path without tag (e.g. quay.io/myorg/opendatahub-operator)
#   QUAY_TAG — Default tag for the operator image (e.g. latest or a CI tag)
#
# Optional bundle deploy (advanced):
#   - Set workflow input deploy_bundle to true
#   - Add repository secret KUBECONFIG with the raw kubeconfig file contents
#   - Ensure the cluster can pull from your Quay repo

name: Build ODH operator and catalog

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag_base:
        description: "Full image repo without tag (empty = secret QUAY_REPO)"
        required: false
        default: ""
        type: string
      img_tag:
        description: "Tag for the operator image (empty = secret QUAY_TAG)"
        required: false
        default: ""
        type: string
      version:
        description: "OLM bundle/catalog VERSION (empty = upstream Makefile default)"
        required: false
        default: ""
        type: string
      git_ref:
        description: "Upstream opendatahub-operator branch, tag, or commit"
        required: false
        default: "main"
        type: string
      deploy_bundle:
        description: "Run operator-sdk run bundle after push (needs kubeconfig secret)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      operator_image: ${{ steps.export.outputs.operator_image }}
      bundle_image: ${{ steps.export.outputs.bundle_image }}
      catalog_image: ${{ steps.export.outputs.catalog_image }}
      version: ${{ steps.export.outputs.version }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Install kubectl (required for bundle deploy)
        if: github.event_name == 'workflow_dispatch' && inputs.deploy_bundle == true
        run: |
          curl -sSL -o kubectl "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 755 kubectl /usr/local/bin/kubectl

      - name: Write kubeconfig (bundle deploy only)
        if: github.event_name == 'workflow_dispatch' && inputs.deploy_bundle == true
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "${KUBECONFIG_CONTENT}" ]; then
            echo "When deploy_bundle is true, add repository secret KUBECONFIG with your kubeconfig contents."
            exit 1
          fi
          printf '%s\n' "${KUBECONFIG_CONTENT}" > "${GITHUB_WORKSPACE}/kubeconfig"
          chmod 600 "${GITHUB_WORKSPACE}/kubeconfig"
          echo "KUBECONFIG=${GITHUB_WORKSPACE}/kubeconfig" >> "$GITHUB_ENV"

      - name: Build and push images
        env:
          IMAGE_TAG_BASE: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag_base != '' && inputs.image_tag_base || secrets.QUAY_REPO }}
          IMG_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.img_tag != '' && inputs.img_tag || secrets.QUAY_TAG }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
          OPERATOR_GIT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || 'main' }}
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          DEPLOY_BUNDLE: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_bundle == true && '1' || '0' }}
          BUILD_OUTPUT_ENV: ${{ github.workspace }}/build-output.env
        run: ./scripts/build-and-push-odh-operator.sh

      - name: Export job outputs (where the build is)
        id: export
        run: |
          set -a
          source "${{ github.workspace }}/build-output.env"
          set +a
          {
            echo "operator_image=${OPERATOR_IMAGE}"
            echo "bundle_image=${BUNDLE_IMAGE}"
            echo "catalog_image=${CATALOG_IMAGE}"
            echo "version=${VERSION}"
          } >> "$GITHUB_OUTPUT"
          echo "### Built images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Operator:** \`${OPERATOR_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Bundle:** \`${BUNDLE_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Catalog:** \`${CATALOG_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "These values are also available as job outputs: \`operator_image\`, \`bundle_image\`, \`catalog_image\`, \`version\`." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-output-env
          path: build-output.env
          if-no-files-found: error
