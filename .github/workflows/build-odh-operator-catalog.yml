# Build and push Open Data Hub operator, OLM bundle, and catalog images
# (upstream: https://github.com/opendatahub-io/opendatahub-operator)
#
# Configure repository variables (Settings → Secrets and variables → Actions → Variables) — recommended for
# image paths/tags so logs are not redacted. Optional secrets with the same names still work as fallback.
#   QUAY_REPO — Operator image path without tag (e.g. quay.io/myorg/opendatahub-operator)
#   QUAY_BUNDLE_REPO — Optional OLM bundle image path without tag (e.g. quay.io/myorg/odh-operator-bundle).
#     If unset, bundle is ${QUAY_REPO}-bundle:v$VERSION
#   QUAY_CATALOG_REPO — Optional catalog index path without tag
#   QUAY_TAG — Operator image tag only (not OLM bundle version)
#   QUAY_OLM_VERSION — Optional OLM bundle/catalog VERSION (e.g. 3.4.0); tags …-bundle:v$VERSION and …:v$VERSION
#
# Secrets (required):
#   QUAY_USERNAME — Quay.io username or robot account name
#   QUAY_PASSWORD — Quay.io password or robot token
#
# Optional MaaS manifest overrides (variables preferred; same-name secrets as fallback):
#   MAAS_MANIFEST_REF, MAAS_MANIFEST_PIN_LATEST, MAAS_MANIFEST_REPO, MAAS_MANIFEST_ORG,
#   MAAS_MANIFEST_SOURCE_PATH, MAAS_MANIFEST_WRITE_FILE
#
# Optional bundle deploy (advanced):
#   - Set workflow input deploy_bundle to true
#   - Add repository secret KUBECONFIG with the raw kubeconfig file contents
#   - Ensure the cluster can pull from your Quay repo

name: Build ODH operator and catalog

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag_base:
        description: "Full image repo without tag (empty = variable or secret QUAY_REPO)"
        required: false
        default: ""
        type: string
      img_tag:
        description: "Tag for the operator image (empty = variable or secret QUAY_TAG)"
        required: false
        default: ""
        type: string
      catalog_repo:
        description: "Catalog image path without tag (empty = variable or secret QUAY_CATALOG_REPO)"
        required: false
        default: ""
        type: string
      bundle_repo:
        description: "OLM bundle image path without tag (empty = variable or secret QUAY_BUNDLE_REPO)"
        required: false
        default: ""
        type: string
      version:
        description: "OLM VERSION e.g. 3.4.0 (empty = variable or secret QUAY_OLM_VERSION, else Makefile default)"
        required: false
        default: ""
        type: string
      git_ref:
        description: "Upstream opendatahub-operator branch, tag, or commit"
        required: false
        default: "main"
        type: string
      deploy_bundle:
        description: "Run operator-sdk run bundle after push (needs kubeconfig secret)"
        required: false
        default: false
        type: boolean
      maas_manifest_ref:
        description: "Override maas manifests ref (empty = variable or secret MAAS_MANIFEST_REF)"
        required: false
        default: ""
        type: string
      maas_manifest_pin_latest:
        description: "Pin main to current commit (main@sha); needs MAAS_MANIFEST_REF=main"
        required: false
        default: false
        type: boolean
      maas_manifest_repo:
        description: "GitHub repo name for maas manifests (empty = variable or secret MAAS_MANIFEST_REPO)"
        required: false
        default: ""
        type: string
      maas_manifest_org:
        description: "GitHub org (empty = variable or secret MAAS_MANIFEST_ORG)"
        required: false
        default: ""
        type: string
      maas_manifest_source_path:
        description: "Path inside repo (empty = variable or secret MAAS_MANIFEST_SOURCE_PATH)"
        required: false
        default: ""
        type: string
      maas_manifest_write_file:
        description: "Rewrite [\"maas\"] lines in cloned get_all_manifests.sh (debug/visibility)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      operator_image: ${{ steps.export.outputs.operator_image }}
      bundle_image: ${{ steps.export.outputs.bundle_image }}
      catalog_image: ${{ steps.export.outputs.catalog_image }}
      version: ${{ steps.export.outputs.version }}
      maas_deploy_command: ${{ steps.export.outputs.maas_deploy_command }}
      maas_deploy_snippet: ${{ steps.export.outputs.maas_deploy_snippet }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Install kubectl (required for bundle deploy)
        if: github.event_name == 'workflow_dispatch' && inputs.deploy_bundle == true
        run: |
          curl -sSL -o kubectl "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 755 kubectl /usr/local/bin/kubectl

      - name: Write kubeconfig (bundle deploy only)
        if: github.event_name == 'workflow_dispatch' && inputs.deploy_bundle == true
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "${KUBECONFIG_CONTENT}" ]; then
            echo "When deploy_bundle is true, add repository secret KUBECONFIG with your kubeconfig contents."
            exit 1
          fi
          printf '%s\n' "${KUBECONFIG_CONTENT}" > "${GITHUB_WORKSPACE}/kubeconfig"
          chmod 600 "${GITHUB_WORKSPACE}/kubeconfig"
          echo "KUBECONFIG=${GITHUB_WORKSPACE}/kubeconfig" >> "$GITHUB_ENV"

      - name: Build and push images
        env:
          IMAGE_TAG_BASE: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag_base != '' && inputs.image_tag_base || vars.QUAY_REPO || secrets.QUAY_REPO }}
          IMG_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.img_tag != '' && inputs.img_tag || vars.QUAY_TAG || secrets.QUAY_TAG }}
          BUNDLE_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.bundle_repo != '' && inputs.bundle_repo || vars.QUAY_BUNDLE_REPO || secrets.QUAY_BUNDLE_REPO }}
          CATALOG_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.catalog_repo != '' && inputs.catalog_repo || vars.QUAY_CATALOG_REPO || secrets.QUAY_CATALOG_REPO }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' && inputs.version || vars.QUAY_OLM_VERSION || secrets.QUAY_OLM_VERSION }}
          OPERATOR_GIT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || 'main' }}
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          DEPLOY_BUNDLE: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_bundle == true && '1' || '0' }}
          BUILD_OUTPUT_ENV: ${{ github.workspace }}/build-output.env
          MAAS_MANIFEST_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.maas_manifest_ref != '' && inputs.maas_manifest_ref || vars.MAAS_MANIFEST_REF || secrets.MAAS_MANIFEST_REF }}
          MAAS_MANIFEST_PIN_LATEST: ${{ github.event_name == 'workflow_dispatch' && inputs.maas_manifest_pin_latest == true && '1' || vars.MAAS_MANIFEST_PIN_LATEST || secrets.MAAS_MANIFEST_PIN_LATEST }}
          MAAS_MANIFEST_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.maas_manifest_repo != '' && inputs.maas_manifest_repo || vars.MAAS_MANIFEST_REPO || secrets.MAAS_MANIFEST_REPO }}
          MAAS_MANIFEST_ORG: ${{ github.event_name == 'workflow_dispatch' && inputs.maas_manifest_org != '' && inputs.maas_manifest_org || vars.MAAS_MANIFEST_ORG || secrets.MAAS_MANIFEST_ORG }}
          MAAS_MANIFEST_SOURCE_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.maas_manifest_source_path != '' && inputs.maas_manifest_source_path || vars.MAAS_MANIFEST_SOURCE_PATH || secrets.MAAS_MANIFEST_SOURCE_PATH }}
          MAAS_MANIFEST_WRITE_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.maas_manifest_write_file == true && '1' || vars.MAAS_MANIFEST_WRITE_FILE || secrets.MAAS_MANIFEST_WRITE_FILE }}
        run: ./scripts/build-and-push-odh-operator.sh

      - name: Export job outputs (where the build is)
        id: export
        run: |
          set -a
          source "${{ github.workspace }}/build-output.env"
          set +a
          {
            echo "operator_image=${OPERATOR_IMAGE}"
            echo "bundle_image=${BUNDLE_IMAGE}"
            echo "catalog_image=${CATALOG_IMAGE}"
            echo "version=${VERSION}"
            echo "maas_deploy_command=${MAAS_DEPLOY_COMMAND}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "maas_deploy_snippet<<MAAS_SNIP"
            echo "${MAAS_DEPLOY_SNIPPET}"
            echo "MAAS_SNIP"
          } >> "$GITHUB_OUTPUT"
          echo "### Built images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:** The **operator** image uses \`QUAY_TAG\` / \`img_tag\` (\`operator_image\`). **Bundle** and **catalog** images use OLM \`VERSION\` in the form \`v\$VERSION\` (from repository variable \`QUAY_OLM_VERSION\`, the \`version\` input, or the upstream Makefile default). They are not the same as the operator tag." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Logs:** Values stored as [secrets](https://docs.github.com/en/actions/security-guides/using-secrets-in-github-actions) are masked as \`***\` in logs. Use [repository variables](https://docs.github.com/en/actions/learn-github-actions/variables#defining-configuration-variables-for-multiple-workflows) for image paths and tags to see full names here (keep \`QUAY_USERNAME\` / \`QUAY_PASSWORD\` as secrets)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Operator:** \`${OPERATOR_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Bundle:** \`${BUNDLE_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Catalog:** \`${CATALOG_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Job outputs: \`operator_image\`, \`bundle_image\`, \`catalog_image\`, \`version\`, \`maas_deploy_command\`, \`maas_deploy_snippet\`." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Models-as-a-Service (MaaS) deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "These images are built for the Open Data Hub operator (including the **maas** component). [\`deploy.sh\`](https://github.com/opendatahub-io/maas-billing/blob/main/scripts/deploy.sh) takes **\`--operator-catalog\`** (index image) and **\`--operator-image\`**; the catalog you built already references your **OLM bundle** image below. See [Models-as-a-Service install](https://opendatahub-io.github.io/models-as-a-service/latest/install/maas-setup/)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "${MAAS_DEPLOY_SNIPPET}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-output-env
          path: build-output.env
          if-no-files-found: error
